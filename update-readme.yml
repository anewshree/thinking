name: Update README with Articles

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Python runs inline — no separate file needed, no setup-python needed
      - name: Scan articles and update README
        shell: python3 {0}
        run: |
          import os, re, subprocess
          from datetime import datetime

          README_PATH  = "README.md"
          START_MARKER = "<!-- ARTICLES_START -->"
          END_MARKER   = "<!-- ARTICLES_END -->"
          SKIP_DIRS    = {".git", ".github", "scripts", "assets", "images"}
          SKIP_FILES   = {"README.md", "LICENSE.md", "CONTRIBUTING.md"}

          def get_title(filepath):
              try:
                  with open(filepath, "r", encoding="utf-8", errors="ignore") as f:
                      for line in f:
                          if line.strip().startswith("# "):
                              return line.strip()[2:].strip()
              except:
                  pass
              return os.path.splitext(os.path.basename(filepath))[0].replace("-"," ").replace("_"," ").title()

          def get_date(filepath):
              try:
                  r = subprocess.run(
                      ["git", "log", "--follow", "--format=%as", "--", filepath],
                      capture_output=True, text=True, timeout=10)
                  lines = [l.strip() for l in r.stdout.splitlines() if l.strip()]
                  if lines:
                      return datetime.strptime(lines[-1], "%Y-%m-%d")
              except:
                  pass
              return datetime.now()

          articles = []
          for root, dirs, files in os.walk("."):
              dirs[:] = [d for d in dirs if d not in SKIP_DIRS and not d.startswith(".")]
              for f in files:
                  if not f.endswith(".md") or f in SKIP_FILES:
                      continue
                  raw   = os.path.join(root, f)
                  path  = raw.replace("\\", "/").lstrip("./").lstrip("/")
                  parts = path.split("/")
                  folder = "/" + parts[0] if len(parts) > 1 else "/root"
                  title  = get_title(raw)
                  date   = get_date(raw)
                  print(f"  + {title} | {folder} | {date.strftime('%b %Y')}")
                  articles.append({"title": title, "date": date, "folder": folder, "path": path})

          articles.sort(key=lambda a: a["date"], reverse=True)
          print(f"Total: {len(articles)} article(s) found.")

          if articles:
              rows = ["| Article | Folder | Published |", "|---------|--------|-----------|"]
              for a in articles:
                  rows.append(f"| [{a['title']}]({a['path']}) | `{a['folder']}` | {a['date'].strftime('%b %Y')} |")
              rows.append("")
              rows.append(f"_Last updated: {datetime.now().strftime('%d %b %Y')} · {len(articles)} article(s)_")
              table = "\n".join(rows)
          else:
              table = "_No articles yet. Watch this space._"

          new_block = f"{START_MARKER}\n{table}\n{END_MARKER}"

          if os.path.exists(README_PATH):
              with open(README_PATH, "r", encoding="utf-8") as fh:
                  content = fh.read()
          else:
              content = "# thinking\n\n"

          if START_MARKER in content and END_MARKER in content:
              content = re.sub(
                  re.escape(START_MARKER) + r".*?" + re.escape(END_MARKER),
                  new_block, content, flags=re.DOTALL)
              print("Updated existing article section in README.")
          else:
              content += f"\n\n## 📝 Articles\n\n{new_block}\n"
              print("Added new article section to README.")

          with open(README_PATH, "w", encoding="utf-8") as fh:
              fh.write(content)
          print("Done.")

      - name: Commit and push if changed
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add README.md
          git diff --cached --quiet && echo "No changes — skipping commit." || \
            (git commit -m "📝 Auto-update article list" && git push)
