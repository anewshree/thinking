name: Update README with Articles

on:
  push:
    branches: [main]       # runs every time you push
  workflow_dispatch:        # lets you trigger it manually from GitHub

permissions:
  contents: write           # allows the action to commit back to your repo

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    # needed to get accurate commit dates per file

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run article scanner
        run: python scripts/update_readme.py

      - name: Commit and push if README changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add README.md
          git diff --staged --quiet || git commit -m "📝 Auto-update article list"
          git push
