name: Update README with Articles

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # fixes the Node.js warning

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run article scanner
        run: python scripts/update_readme.py

      - name: Commit and push only if README changed
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add README.md
          if ! git diff --staged --quiet; then
            git commit -m "📝 Auto-update article list"
            git push
          else
            echo "No changes to README — skipping commit."
          fi
